server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/stockdb
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your_super_secret_key_which_should_be_long_and_secure
  expiration: 86400000   # 1 day in milliseconds